name: CI

on:
  push:
    branches: [ master ]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # macos-15 ships with a recent Xcode and is the most stable
    # GitHub-hosted runner for native iOS builds at the moment.
    # `--overrideXcodeVersion` below tells Make.py to use whatever
    # Xcode is currently selected instead of pinning to versions.json.
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Select latest installed Xcode
        run: |
          set -x
          # Pick the highest-versioned Xcode installed on the runner.
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode installation found on runner" >&2
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --overrideXcodeVersion \
            --overrideBazelVersion \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          # collect ipa
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" "$OUTPUT_PATH/Nexus.ipa"
          done

          # collect dsym
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/Nexus.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/Nexus.ipa
          if-no-files-found: error

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Nexus ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            An unsigned build of Nexus for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }}).

            Nexus is an unofficial client based on the Telegram-iOS source code.
            Sideload via AltStore / Sideloadly / TestFlight (your own developer account).
          draft: false
          prerelease: false
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Nexus.ipa
            /Users/Shared/telegram-ios/build/artifacts/Nexus.DSYMs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
