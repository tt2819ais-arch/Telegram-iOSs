workflows:
  telegram-mod:
    name: Telegram Mod with Deleted Messages
    environment:
      xcode: 15.2
      cocoapods: default
      vars:
        XCODE_PROJECT: "Telegram.xcodeproj"
        XCODE_SCHEME: "Telegram"
        BUNDLE_ID: "org.telegram.TelegramMod"
      node: 18
    cache:
      cache_paths:
        - ~/Library/Caches/CocoaPods
        - ~/Library/Caches/bazel
        - ~/Library/Caches/bazelisk
    scripts:
      - name: Fix submodules
        script: |
          # Удаляем проблемные сабмодули
          sed -i '' '/tgcalls/d' .gitmodules
          sed -i '' '/rlottie/d' .gitmodules
          rm -rf .git/modules/submodules/TgVoipWebrtc
          rm -rf .git/modules/submodules/rlottie
          rm -rf submodules/TgVoipWebrtc/tgcalls
          rm -rf submodules/rlottie/rlottie
          mkdir -p submodules/TgVoipWebrtc/tgcalls
          mkdir -p submodules/rlottie/rlottie
          touch submodules/TgVoipWebrtc/tgcalls/.gitkeep
          touch submodules/rlottie/rlottie/.gitkeep
          
      - name: Install Bazel
        script: |
          brew install bazelisk
          
      - name: Setup project
        script: |
          chmod +x build.sh
          ./build.sh setup
          
      - name: Build IPA
        script: |
          ./build.sh build --configuration=release_dev --buildNumber=$BUILD_NUMBER --bundleId=$BUNDLE_ID
          
      - name: Copy IPA
        script: |
          mkdir -p build/artifacts
          find . -name "*.ipa" -type f -exec cp {} build/artifacts/TelegramMod.ipa \;
    artifacts:
      - build/artifacts/*.ipa
      - build/artifacts/*.xcarchive
